<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../assets/style/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <nav>
    <div class="dropdown">
      <img src="./assets/img/menu-hamburguer.png" class="icones">
      <div class="dropdown-content" id="dropdownMenu">
        <a href="calendar.html">Calendário</a>
      </div>
    </div>
    <a href="index.html" id="logoNav"><img id="logoImgNav" src="./assets/img/logo.png"></a>
    <div id="userArea"></div>
  </nav>

  <main class="d-flex justify-content-center align-items-center" style="min-height: 80vh; padding: 2rem;">
    <div class="card p-4 shadow" style="max-width: 380px; width: 100%;">
      <h2 class="mb-4 text-center">Entrar</h2>
      <div id="loginError" class="alert alert-danger" style="display:none;">
        Nome ou senha incorretos.
      </div>
      <div class="mb-3">
        <label for="nome" class="form-label">Nome de usuário</label>
        <input type="text" class="form-control" id="nome" placeholder="Seu nome">
      </div>
      <div class="mb-3">
        <label for="senha" class="form-label">Senha</label>
        <input type="password" class="form-control" id="senha" placeholder="Sua senha">
      </div>
      <button id="btnLogin" class="btn btn-dark w-100">Entrar</button>
      <p class="mt-3 text-center">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>
  </main>

<script src="../../assets/js/login.js"></script>
</body>

</html>
