<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamentos - OPM</title>

    <link rel="icon" type="image/png" href="../../assets/images/icon.png">

    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="../../assets/css/header.css">
    <link rel="stylesheet" href="../../assets/css/treinamentos.css">
</head>

<body>

    <header id="header-container"></header>

    <main class="container">
        
        <section class="titulo-secao">
            <h2>STATUS DE TREINAMENTO</h2>
        </section>

        <section id="visao-colaborador" class="painel-usuario" style="display: none;">
            </section>

        <section class="treinamentos-rapidos">
            <h3>Treinamentos Rápidos</h3>
            <div class="rapidos-container">
                <div class="rapido-card"><img src="https://loremflickr.com/300/200/industry?random=1" alt="Thumbnail"></div>
                <div class="rapido-card"><img src="https://loremflickr.com/300/200/industry?random=2" alt="Thumbnail"></div>
                <div class="rapido-card"><img src="https://loremflickr.com/300/200/industry?random=3" alt="Thumbnail"></div>
                <div class="rapido-card"><img src="https://loremflickr.com/300/200/industry?random=4" alt="Thumbnail"></div>
                <div class="rapido-card"><img src="https://loremflickr.com/300/200/industry?random=5" alt="Thumbnail"></div>
                <div class="rapido-card"><img src="https://loremflickr.com/300/200/industry?random=6" alt="Thumbnail"></div>
                <div class="rapido-card"><img src="https://loremflickr.com/300/200/industry?random=7" alt="Thumbnail"></div>
            </div>
        </section>

        <section class="treinamentos">
            <h3>Treinamentos</h3>

            <div class="filtros">
                <input 
                    type="text" 
                    id="pesquisa" 
                    placeholder="Pesquisar treinamento..."
                >

                <select id="categoria">
                    <option value="Todos">Todas categorias</option>
                    <option value="Segurança">Segurança</option>
                    <option value="Operação">Operação</option>
                    <option value="Qualidade">Qualidade</option>
                    <option value="Logística">Logística</option>
                </select>
            </div>

            <div class="treinamentos-grid" id="treinamentosGrid"></div>
        </section>

    </main>

    <script src="../../assets/js/header.js"></script>
    <script src="../../assets/js/treinamentos.js"></script>

</body>
</html>
