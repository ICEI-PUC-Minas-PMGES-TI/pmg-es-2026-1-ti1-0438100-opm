<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listagem de Peças CNC</title>

  <link rel="stylesheet" href="../../assets/css/header.css">
  <link rel="stylesheet" href="../../assets/css/lista-de-pecas.css">
  <link rel="icon" type="image/png" href="../../assets/images/icon.png">
</head>

<body>

  <div id="header"></div>

  <main>

    <section class="filtros-container">

      <div class="filtros">
        <h2>FILTROS</h2>

        <div class="campos-filtros">

          <div class="campo">
            <label>Máquina CNC</label>
            <select id="filtroMaquina">
              <option value="">Todos</option>
            </select>
          </div>

          <div class="campo">
            <label>Prioridade</label>
            <select id="filtroPrioridade">
              <option value="">Todas</option>
            </select>
          </div>

          <div class="campo">
            <label>Status</label>
            <select id="filtroStatus">
              <option value="">Todos</option>
            </select>
          </div>

          <div class="campo buscar">
            <label>Buscar peça</label>
            <input id="filtroBusca" type="text" placeholder="Digite o nome ou código da peça...">
          </div>

          <div class="campo">
            <label>Data</label>
            <input id="filtroData" type="date">
          </div>

        </div>

        <div class="botoes-filtro">
          <button id="btnLimpar" class="btn secundario">🔄 Limpar</button>
          <button id="btnFiltrar" class="btn principal">🔎 Filtrar</button>
        </div>

      </div>

      <aside class="oee-card">

        <h2>OEE - MÁQUINA SELECIONADA</h2>

        <div class="oee-conteudo">

          <div id="oeePercentual" class="oee-circulo">
            68%
          </div>

          <div class="oee-indicadores">
            <p>Disponibilidade <strong id="disponibilidade">72%</strong></p>
            <p>Performance <strong id="performance">75%</strong></p>
            <p>Qualidade <strong id="qualidade">84%</strong></p>
          </div>

        </div>

        <p class="meta">Meta: 85%</p>

      </aside>

    </section>

    <section class="lista-pecas">

      <div class="titulo-lista">
        <h2>LISTA DE PEÇAS</h2>
        <span id="totalPecas">Total de peças: 0</span>
      </div>

      <div class="tabela-container">

        <table class="tabela-pecas">

          <thead>
            <tr>
              <th>#</th>
              <th>Código</th>
              <th>Peça</th>
              <th>Máquina CNC</th>
              <th>Prioridade</th>
              <th>Quantidade/Dia</th>
              <th>Tempo Ciclo (min)</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="corpoTabela"></tbody>

        </table>

      </div>

    </section>

    <footer class="rodape">

      <div>
        <label>Ordenar por</label>

        <select id="ordenarPor">
          <option value="prioridade">Prioridade</option>
          <option value="quantidade">Quantidade</option>
          <option value="tempo">Tempo de ciclo</option>
        </select>
      </div>

      <button id="btnAtualizar" class="btn secundario">
        🔄 Atualizar lista
      </button>

      <button id="btnExportar" class="btn principal">
        ⬇ Exportar relatório
      </button>

    </footer>

  </main>

  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/lista-de-pecas.js"></script>

</body>
</html>
