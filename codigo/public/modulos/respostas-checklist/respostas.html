<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respostas Admin - Opera Máquinas</title>
    <link rel="stylesheet" href="../../assets/css/respostas.css">
    <link rel="stylesheet" href="../../assets/css/header.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="icon" type="image/png" href="../../assets/images/icon.png">
</head>
<body>

    <div id="header"></div>

    <main>
        <div class="painel-respostas">

    <h1>Histórico de Checklists</h1>

    <div class="filtros">

        <input
            type="text"
            id="filtro-funcionario"
            placeholder="Funcionário"
        >

        <select id="filtro-maquina">
            <option value="">Todas as máquinas</option>
            <option value="Torno CNC">Torno CNC</option>
            <option value="Fresadora">Fresadora</option>
            <option value="Furadeira">Furadeira</option>
        </select>

        <input
            type="date"
            id="filtro-data"
        >

        <button type="button" id="btn-buscar" class="buscar">
            Buscar
        </button>

    </div>

    <div class="tabela-container">

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Funcionário</th>
                    <th>Máquina</th>
                    <th>Data</th>
                </tr>

            </thead>

            <tbody id="tabela-respostas">


            </tbody>

        </table>

    </div>

</div>
    </main>

<script src="../../assets/js/header.js"></script>
<script src="../../assets/js/respostas.js"></script>
</body>
</html>
