<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respostas Admin - Opera Máquinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/respostas.css">
    <link rel="stylesheet" href="../../assets/css/header.css">
    <link rel="icon" type="image/png" href="../../assets/images/icon.png">
</head>
<body>

    <div id="header"></div>

    <main>
        <div class="painel-respostas">

    <h1>Histórico de Checklists</h1>

    <div class="filtros">

        <input
            type="text"
            id="filtro-funcionario"
            placeholder="Funcionário"
        >

        <select id="filtro-maquina">
            <option value="">Todas as máquinas</option>
            <option value="Torno CNC">Torno CNC</option>
            <option value="Fresadora">Fresadora</option>
            <option value="Furadeira">Furadeira</option>
        </select>

        <input
            type="date"
            id="filtro-data"
        >

        <button type="button" id="btn-buscar" class="buscar">
            Buscar
        </button>

    </div>

    <div class="tabela-container">

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Funcionário</th>
                    <th>Máquina</th>
                    <th>Data</th>
                </tr>

            </thead>

            <tbody id="tabela-respostas">


            </tbody>

        </table>

    </div>

</div>
    </main>

<div class="modal fade" id="modalChecklist" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content modal-dark-custom">

            <div class="modal-header">
                <h5 class="modal-title">Detalhes da Checklist</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="conteudo-modal">
                <!-- JS coloca os dados aqui -->
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-warning" data-bs-dismiss="modal">
                    Fechar
                </button>
            </div>

        </div>
    </div>
</div>

<script src="../../assets/js/header.js"></script>
<script src="../../assets/js/respostas.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
