<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Avisos</title>
    <link rel="stylesheet" href="../../assets/css/cadastro-avisos.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="icon" type="image/png" href="../../assets/images/icon.png">
    <link rel="stylesheet" href="../../assets/css/header.css">
</head>

<body>

    <div id="header"></div>

    <main class="corpo">
        <section class="esquerda">
            <div class="botoes-acao">
                <button class="funil">
                    <img src="../../assets/images/filter-svgrepo-com.svg" alt="funil">
                </button>
                <button class="deletar">Deletar</button>
                <!-- <button class="alterar">Alterar</button> -->
            </div>

            <table class="tabela">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Importância</th>
                        <th>Tipo</th>
                        <th>Data</th>
                        <th>Texto</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </section>

        <section class="direita">
            <div class="selecao-direita">
                <h1>Texto</h1>
                <input placeholder="Insira o texto do aviso" type="text">
            </div>

            <div class="selecao-direita">
                <h1>Importância</h1>
                <select id="importancia" name="importancia">
                    <option value="">Selecione a importância da peça</option>
                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>
                </select>
            </div>

            <div class="selecao-direita">
                <h1>Tipo</h1>
                <select name="tipo" id="tipo">
                    <option value="">Selecione os tipos de usuário que verão o aviso</option>
                    <option value="Alta">Operário</option>
                    <option value="Média">Manutenção</option>
                    <option value="Baixa">Gestor</option>
                </select>
            </div>

            <div class="calendario_area">
                <h1>Periodo de atividade</h1>

                <div class="calendario">
                    <div class="calendario_topo">

                        <select>
                            <option>Mês</option>
                            <option id="mes1">Janeiro</option>
                            <option>Fevereiro</option>
                            <option>Março</option>
                            <option>Abril</option>
                            <option>Maio</option>
                            <option>Junho</option>
                            <option>Julho</option>
                            <option>Agosto</option>
                            <option>Setembro</option>
                            <option>Outubro</option>
                            <option>Novembro</option>
                            <option>Dezembro</option>
                        </select>

                        <select>
                            <option>2026</option>
                        </select>


                    </div>

                    <div class="dias_semana">
                        <span>Seg</span>
                        <span>Ter</span>
                        <span>Qua</span>
                        <span>Qui</span>
                        <span>Sex</span>
                        <span>Sáb</span>
                        <span>Dom</span>
                    </div>

                    <div class="dias">
                        <span></span>
                        <span>1</span>
                        <span>2</span>
                        <span>3</span>
                        <span>4</span>
                        <span>5</span>
                        <span>6</span>

                        <span>7</span>
                        <span>8</span>
                        <span>9</span>
                        <span>10</span>
                        <span>11</span>
                        <span>12</span>
                        <span class="selecionado">13</span>

                        <span>14</span>
                        <span>15</span>
                        <span>16</span>
                        <span>17</span>
                        <span>18</span>
                        <span>19</span>
                        <span>20</span>

                        <span>21</span>
                        <span>22</span>
                        <span>23</span>
                        <span>24</span>
                        <span>25</span>
                        <span>26</span>
                        <span>27</span>

                        <span>28</span>
                        <span>29</span>
                        <span>30</span>
                        <span class="apagado">1</span>
                        <span class="apagado">2</span>
                        <span class="apagado">3</span>
                        <span class="apagado">4</span>
                    </div>
                </div>

                <div class="botoes_calendario">
                    <button class="limpar">Limpar</button>
                    <button class="adicionar">Adicionar</button>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div class="final-footer">
            <h1>Opera Máquinas &copy</h1>
        </div>
    </footer>
    <script src="../../assets/js/cadastro-de-avisos.js"></script>
    <script src="../../assets/js/header.js"></script>
</body>

</html>
