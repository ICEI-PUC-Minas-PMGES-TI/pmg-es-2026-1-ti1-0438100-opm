<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - Opera Máquinas</title>
    <link rel="stylesheet" href="../../assets/css/checklist.css">
    <link rel="stylesheet" href="../../assets/css/header.css">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <div id="header"></div>

    <main>
        <section class="form-container">

            <label for="maquina">Tipo de máquina</label>
            <select id="maquina">
                <option value="">Selecione o tipo de máquina</option>
                <option value="torno">Torno CNC</option>
                <option value="fresa">Fresadora</option>
                <option value="furadeira">Furadeira</option>
                <option value="maquina_exemplo">Máquina Exemplo 1</option>
                <option value="maquina_exemplo_2">Máquina Exemplo 2</option>
                <option value="maquina_exemplo_3">Máquina Exemplo 3</option>
            </select>

            <div class="checklist" id="checklist"></div>

            <button class="enviar">Enviar</button>

        </section>
    </main>

<script src="../../assets/js/header.js"></script>
<script src="../../assets/js/checklist.js"></script>
</body>
</html>
