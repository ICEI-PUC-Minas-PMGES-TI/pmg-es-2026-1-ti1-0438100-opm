<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../assets/css/cadastro-pecas.css">
    <link rel="stylesheet" href="../../assets/css/header.css">
    <link rel="icon" type="image/png" href="../../assets/images/icon.png">
</head>

<body>

    <div id="header"></div>

    <main>

        <!--Painel da esquerda-->
        <section>
            <div class="botoes-container">
                <button class="btn btn-deletar" onclick="deletarSelecionado()">Deletar</button>
                <button class="btn btn-editar" onclick="alterarSelecionado()">Alterar</button>
                <button class="btn btn-filter" onclick="toggleFiltro()">⚙ Filtrar</button>

            </div>
            <div class="filter-panel" id="filterPanel">
                <div class="filter-row">
                    <div class="filter-field">
                        <label>Tipo</label>
                        <div class="select-wrap">
                            <select id="filtTipo" onchange="renderTabela()">
                                <option value="">Todos</option>
                                <option>Peça</option>
                                <option>Componente</option>
                                <option>Acessório</option>
                                <option>Consumível</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-field">
                        <label>Modelo</label>
                        <input id="filtModelo" type="text" placeholder="Buscar modelo..." oninput="renderTabela()" />
                    </div>
                    <div class="filter-field">
                        <label>Fabricante</label>
                        <input id="filtFabricante" type="text" placeholder="Buscar fabricante..."
                            oninput="renderTabela()" />
                    </div>
                    <div class="filter-field">
                        <label>Associação</label>
                        <input id="filtAssociacao" type="text" placeholder="Buscar máquina..."
                            oninput="renderTabela()" />
                    </div>
                    <div class="filter-field">
                        <label>Ano</label>
                        <div class="select-container">
                            <select id="filtAno" onchange="renderTabela()">
                                <option value="">Todos</option>
                                <option>2024</option>
                                <option>2023</option>
                                <option>2022</option>
                                <option>2021</option>
                                <option>2020</option>
                                <option>2019</option>
                                <option>2018</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn-limpar-filtro" onclick="limparFiltro()">Limpar filtros</button>
                </div>
            </div>
            <div id="table-container">
                <table id="tabela">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Tipo</th>
                            <th>Modelo</th>
                            <th>Código</th>
                            <th>Fabricante</th>
                            <th>Associação</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                    </tbody>
                </table>
            </div>
        </section>

        <!--Painel da direita-->
        <section class="form-container">
            <h2>Cadastro de Peça</h2>

            <div class="campo">
                <label>Tipo</label>
                <div class="select-container">
                    <select id="fTipo">
                        <option value="">Selecione o tipo</option>
                        <option>Peça</option>
                        <option>Componente</option>
                        <option>Acessório</option>
                        <option>Consumível</option>
                    </select>
                </div>
            </div>

            <div class="campo">
                <label>Modelo da Peça</label>
                <input id="fModelo" type="text" placeholder="Insira o nome da peça" />
            </div>

            <div class="campo">
                <label>Código da Peça</label>
                <input id="fCodigo" type="text" placeholder="Insira o código da peça" />
            </div>

            <div class="campo">
                <label>Fabricante da Peça</label>
                <input id="fFabricante" type="text" placeholder="Insira o nome do fabricante" />
            </div>

            <div class="campo">
                <label>Associação da Máquina</label>
                <input id="fAssociacao" type="text" placeholder="Insira a máquina associada à peça" />
            </div>

            <div class="campo">
                <label>Ano de Peça</label>
                <div class="select-container">
                    <select id="fAno">
                        <option value="">Insira o ano de fabricação da peça</option>
                        <option>2024</option>
                        <option>2023</option>
                        <option>2022</option>
                        <option>2021</option>
                        <option>2020</option>
                        <option>2019</option>
                        <option>2018</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn-limpar" onclick="limparForm()">Limpar</button>
                <button class="btn-adicionar" onclick="adicionarOuSalvar()">Adicionar</button>
            </div>
            </div>

        </section>
    </main>
    <footer>

    </footer>
    <div class="toast" id="toast"></div>
    <script src="../../assets/js/header.js"></script>
    <script src="../../assets/js/cadastro-pecas.js"></script>
</body>

</html>
